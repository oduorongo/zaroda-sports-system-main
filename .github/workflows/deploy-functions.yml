name: Deploy Supabase Edge Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets_check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF is not set. Skipping edge function deployment."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.secrets_check.outputs.can_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase CLI
        if: steps.secrets_check.outputs.can_deploy == 'true'
        run: npm install -g supabase

      - name: Deploy Edge Functions
        if: steps.secrets_check.outputs.can_deploy == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase projects list --json || true
          # Deploy all functions under supabase/functions
          supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF" --no-verify || true
